services:
  postgres:
    image: postgres:16-alpine
    container_name: subsacip-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: subscription_user
      POSTGRES_PASSWORD: subscription_password
      POSTGRES_DB: subscription_manager
    ports:
      - "5432:5432"
    volumes:
      - subsacip-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U subscription_user -d subscription_manager"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  subsacip-postgres-data:
