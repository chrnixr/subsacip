services:
  - type: web
    name: subsacip-web
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    autoDeploy: true
    envVars:
      - key: VITE_API_BASE_URL
        value: https://subsacip-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: subsacip-api
    runtime: node
    rootDir: backend
    region: singapore
    buildCommand: npm ci && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /api
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: HOST
        value: 0.0.0.0
      - key: CORS_ORIGIN
        value: https://subsacip-web.onrender.com
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL
        value: "true"
      - key: TYPEORM_SYNC
        value: "true"
      - key: TYPEORM_LOGGING
        value: "false"
      - key: SEED_DATABASE
        value: "true"
